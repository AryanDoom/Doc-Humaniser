<!DOCTYPE html>
<html>
<body style="width:250px;padding:10px;font-family:sans-serif;">
  <h3>Paste Log Data</h3>

  <textarea
    id="logInput"
    style="width:100%;height:150px;"
    placeholder='[{"action":"type","char":"H","delay":80}]'
  ></textarea>

  <button id="startBtn" style="width:100%;margin-top:10px;">
    Start Writing
  </button>

  <textarea
    id="prompt"
    style="width:100%;height:15px;"
    placeholder='Please type what the essay is supposed to be about'
  ></textarea>

  <button id="promptgivebtn" style="width:100%;margin-top:10px;">
    Give Prompt
  </button>


  <script>
    document.getElementById('startBtn').onclick = async () => {
      const logData = document.getElementById('logInput').value.trim();
      if (!logData) return;

      const [tab] = await chrome.tabs.query({
        active: true,
        currentWindow: true
      });

      chrome.tabs.sendMessage(tab.id, {
        action: "play",
        data: logData
      });
    };
    document.getElementById("promptgivebtn").onclick = () => {
      const promptText = document.getElementById("prompt").value;

      if (!promptText.trim()) {
        alert("Please enter a prompt");
        return;
      }

      console.log("Prompt:", promptText);

      chrome.tabs.query({ active: true, currentWindow: true }, ([tab]) => {
        chrome.tabs.sendMessage(tab.id, {
          action: "prompt",
          data: promptText
      });
    });
  };

  </script>
</body>
</html>
